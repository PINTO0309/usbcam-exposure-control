<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; media-src 'self' blob:; script-src 'self'">
  <title>USB Camera Exposure Control Tester</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #1e1e1e; color: #d4d4d4; padding: 16px; }
    h1 { font-size: 18px; margin-bottom: 12px; color: #569cd6; }
    h2 { font-size: 14px; margin-bottom: 8px; color: #4ec9b0; }

    .video-container { text-align: center; margin-bottom: 12px; }
    video { width: 640px; height: 480px; background: #000; border: 1px solid #333; }

    .section {
      background: #252526; border: 1px solid #333; border-radius: 4px;
      padding: 12px; margin-bottom: 12px;
    }

    .capabilities { font-size: 12px; line-height: 1.8; }
    .capabilities span { color: #ce9178; }

    .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 8px; }

    button {
      background: #0e639c; color: #fff; border: none; padding: 6px 14px;
      border-radius: 3px; cursor: pointer; font-size: 13px;
    }
    button:hover { background: #1177bb; }
    button:disabled { background: #444; cursor: not-allowed; }
    button.active { background: #16825d; }

    label { font-size: 13px; display: flex; align-items: center; gap: 6px; }
    input[type="range"] { width: 200px; }
    .exp-value { font-size: 13px; color: #dcdcaa; min-width: 50px; }

    .status { font-size: 12px; margin-top: 6px; color: #608b4e; }
    .status.error { color: #f44747; }

    #log {
      background: #1e1e1e; border: 1px solid #333; border-radius: 4px;
      padding: 8px; height: 150px; overflow-y: auto; font-family: 'Consolas', monospace;
      font-size: 11px; line-height: 1.6;
    }
    #log .entry { border-bottom: 1px solid #2a2a2a; padding: 2px 0; }
    #log .entry.error { color: #f44747; }
    #log .entry.success { color: #608b4e; }
    #log .entry.info { color: #569cd6; }
  </style>
</head>
<body>
  <h1>USB Camera Exposure Control Tester</h1>

  <div class="video-container">
    <video id="video" autoplay muted playsinline></video>
  </div>

  <!-- Capabilities -->
  <div class="section">
    <h2>Camera Capabilities</h2>
    <div id="capabilities" class="capabilities">カメラ接続待ち...</div>
  </div>

  <!-- Pattern 1: Web API -->
  <div class="section">
    <h2>Pattern 1: Web API (MediaStream)</h2>
    <div class="controls">
      <button id="webapi-auto">Auto Exposure</button>
      <button id="webapi-manual">Manual Exposure</button>
      <label>
        露出時間:
        <input type="range" id="webapi-exp" min="3" max="2047" step="1" value="166">
        <span class="exp-value" id="webapi-exp-value">166</span>
      </label>
      <button id="webapi-apply-exp">適用</button>
    </div>
    <div id="webapi-status" class="status"></div>
  </div>

  <!-- Pattern 2: v4l2-ctl -->
  <div class="section">
    <h2>Pattern 2: v4l2-ctl (Linux V4L2)</h2>
    <div class="controls">
      <button id="v4l2-auto">Auto Exposure (3)</button>
      <button id="v4l2-manual">Manual Exposure (1)</button>
      <label>
        露出時間:
        <input type="range" id="v4l2-exp" min="3" max="2047" step="1" value="166">
        <span class="exp-value" id="v4l2-exp-value">166</span>
      </label>
      <button id="v4l2-apply-exp">適用</button>
    </div>
    <div class="controls" style="margin-top: 4px;">
      <button id="v4l2-get-exposure">現在の露出設定を取得</button>
      <button id="v4l2-list-devices">デバイス一覧</button>
    </div>
    <div id="v4l2-status" class="status"></div>
  </div>

  <!-- Log -->
  <div class="section">
    <h2>Log</h2>
    <div id="log"></div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
